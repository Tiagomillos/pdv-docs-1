site_name: PDV Docs
site_description: Documentação do sistema PDV
site_author: Tiago Millos
site_url: https://tiagomillos.github.io/pdv-docs/

theme:
  name: material

  palette:
    - scheme: slate
      primary: deep orange
      accent: amber

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css
