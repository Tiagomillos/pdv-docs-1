site_name: PDV Docs
site_description: Documentação do sistema PDV
site_author: Tiago Millos
site_url: https://tiagomillos.github.io/pdv-docs/

theme:
  name: material

  palette:

  - scheme: slate
    primary: deep purple
    accent: cyan
    toggle:
      icon: material/brightness-7
      name: Alternar para modo claro

  - scheme: default
    primary: deep orange
    accent: amber
    toggle:
      icon: material/brightness-4
      name: Alternar para modo escuro


    font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html

  - toc:
      permalink: true

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.superfences

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.details

#  - pymdownx.emoji:
#      emoji_index: !!python/name:material.extensions.emoji.twemoji
#      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css
